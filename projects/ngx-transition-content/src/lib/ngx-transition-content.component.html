<!-- Transition between measured dimensions, set to auto once done. -->
<div
  class="resizer"
  [style.transition-duration]="durationHeight() + 'ms'"
  [style.height]="height() !== undefined ? height() + 'px' : 'auto'"
  [style.width]="width() !== undefined ? width() + 'px' : 'auto'"
>
  <!-- Used to measure height. -->
  <div class="wrapperHeight" #wrapperHeight>
    <!-- Used to measure width. Due to browser layout timing, width is measured on its own wrapper. -->
    <div class="wrapperWidth" #wrapperWidth>
      @for (renderedPage of renderedPages(); track renderedPage.page) {
        <div
          class="page"
          [class.page--hidden]="activeSlot() !== renderedPage.slot && leavingSlot() !== renderedPage.slot"
          [class.page--leaving]="leavingSlot() === renderedPage.slot"
          [class.page--entering]="isTransitioning() && activeSlot() === renderedPage.slot"
          [attr.aria-hidden]="activeSlot() === renderedPage.slot ? null : 'true'"
          [style.--ngx-transition-content-fade-duration]="durationFade() + 'ms'"
          [style.--ngx-transition-content-enter-delay]="delayEnter() + 'ms'"
        >
          <ng-container [ngTemplateOutlet]="renderedPage.page.template"></ng-container>
        </div>
      }
    </div>
  </div>
</div>
