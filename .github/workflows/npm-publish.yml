name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org/
      - run: pnpm run test
      - run: pnpm run pack:dry-run
      - run: npm install --global npm@11
      - run: npm --version
      - run: npm publish
        working-directory: ./dist/ngx-transition-content
